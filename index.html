<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Bracket Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
  :root {
    --pitch: #071510; --pitch-mid: #0d2218; --pitch-light: #143320;
    --gold: #f0b429; --gold-dim: #a87a1a; --white: #f0f4f0;
    --muted: #6b8c76; --line: #1e4030; --glow: rgba(240,180,41,0.18);
    --green-accent: #34d378; --card-bg: #0f2a1d;
    --card-border: #1e4030; --card-hover: #162e20;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--pitch); color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: auto; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, #020d07 0%, rgba(2,13,7,0.96) 100%);
    border-bottom: 1px solid var(--line); padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(8px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .trophy-icon { font-size: 28px; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.1; }
  .header-title span { color: var(--gold); }
  .header-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .header-actions { display: flex; gap: 10px; }
  .btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border: none; cursor: pointer; padding: 8px 18px; border-radius: 4px; transition: all 0.15s; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .btn-ghost:hover { color: var(--white); border-color: var(--muted); }
  .btn-gold { background: var(--gold); color: #050e08; }
  .btn-gold:hover { background: #f5c53a; box-shadow: 0 0 14px var(--glow); }

  .progress-bar-wrap { padding: 12px 32px; background: var(--pitch-mid); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 16px; }
  .progress-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-accent), var(--gold)); border-radius: 2px; transition: width 0.4s ease; }
  .progress-pct { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--green-accent); min-width: 36px; text-align: right; }

  .bracket-wrap { padding: 32px; display: flex; gap: 0; min-width: max-content; align-items: stretch; }
  .round-col { display: flex; flex-direction: column; justify-content: space-around; gap: 0; }
  .match-slot { position: relative; display: flex; flex-direction: column; justify-content: center; }

  .match-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; overflow: hidden; width: 200px; transition: border-color 0.2s; }
  .match-card:hover { border-color: var(--muted); }
  .match-venue { background: var(--pitch-light); padding: 4px 10px; font-size: 9px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--line); }

  .team-row { display: flex; align-items: center; padding: 7px 10px; cursor: pointer; gap: 8px; transition: background 0.15s; border-bottom: 1px solid var(--line); position: relative; }
  .team-row:last-child { border-bottom: none; }
  .team-row:hover { background: var(--card-hover); }
  .team-row.selected { background: rgba(52,211,120,0.1); }
  .team-row.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green-accent); border-radius: 3px 0 0 3px; }
  .team-row.eliminated { opacity: 0.35; }
  .team-row.tbd { cursor: default; }
  .team-row.tbd:hover { background: transparent; }

  .flag-wrap { width: 26px; height: 17px; flex-shrink: 0; border-radius: 2px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
  .flag-wrap svg { width: 100%; height: 100%; display: block; }
  .flag-placeholder { width: 26px; height: 17px; flex-shrink: 0; background: var(--line); border-radius: 2px; }

  .team-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.02em; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-row.selected .team-name { color: var(--green-accent); }
  .team-row.tbd .team-name { color: var(--muted); font-style: italic; font-weight: 400; }
  .pick-indicator { font-size: 11px; color: var(--green-accent); opacity: 0; transition: opacity 0.2s; }
  .team-row.selected .pick-indicator { opacity: 1; }

  .final-match { background: linear-gradient(135deg, #1a3a24, #0f2a1d); border: 1px solid var(--gold-dim); border-radius: 6px; overflow: hidden; width: 210px; box-shadow: 0 0 20px rgba(240,180,41,0.08); }
  .final-match .match-venue { background: rgba(240,180,41,0.1); color: var(--gold); border-color: var(--gold-dim); }

  .champion-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 0 40px; }
  .champion-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); text-align: center; }
  .champion-card { background: linear-gradient(135deg, #1a3a24, #0f2a1d); border: 2px solid var(--gold-dim); border-radius: 8px; width: 210px; text-align: center; overflow: hidden; box-shadow: 0 0 40px rgba(240,180,41,0.12); }
  .champion-header { background: var(--gold); padding: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #050e08; }
  .champion-body { padding: 24px 16px; }
  .champion-flag-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .champion-flag-wrap .flag-wrap { width: 64px; height: 42px; border-radius: 4px; border: 2px solid var(--gold-dim); box-shadow: 0 0 16px rgba(240,180,41,0.2); }
  .champion-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 0.04em; color: var(--gold); min-height: 30px; }
  .champion-name.empty { color: var(--muted); font-size: 13px; font-weight: 400; font-style: italic; }
  .trophy-big { font-size: 30px; margin-top: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green-accent); color: #050e08; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px; border-radius: 24px; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: var(--pitch); }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="trophy-icon">🏆</div>
    <div>
      <div class="header-title">FIFA World Cup <span>2026</span></div>
      <div class="header-sub">Bracket Predictor — Round of 32</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="resetBracket()">Reset</button>
    <button class="btn btn-gold" onclick="saveBracket()">Save Picks</button>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-label">Picks Complete</div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>
<div id="bracketWrap" class="bracket-wrap"></div>
<div class="toast" id="toast"></div>

  const svg = FLAGS[name];
  if (!svg) return `<span class="flag-placeholder"></span>`;
  return `<span class="flag-wrap">${svg}</span>`;
}

let picks = {};
function loadPicks(){try{const s=localStorage.getItem('wc2026_bracket');if(s)picks=JSON.parse(s);}catch(e){picks={};}}
function savePicks(){localStorage.setItem('wc2026_bracket',JSON.stringify(picks));}

const matchIndex={};
ROUNDS_DATA.forEach(r=>r.matches.forEach(m=>{matchIndex[m.id]=m;}));

function resolveTeams(matchId){
  const m=matchIndex[matchId];
  if(!m.feeds)return m.teams.map(t=>({...t}));
  return m.feeds.map(feedId=>getWinner(feedId)||{name:'TBD'});
}
function getWinner(matchId){
  const pick=picks[matchId];
  if(pick===undefined)return null;
  const teams=resolveTeams(matchId);
  return teams[pick]&&teams[pick].name!=='TBD'?teams[pick]:null;
}
function pickTeam(matchId,teamIdx){
  const teams=resolveTeams(matchId);
  if(teams[teamIdx].name==='TBD')return;
  if(picks[matchId]!==undefined&&picks[matchId]!==teamIdx)clearDownstream(matchId);
  picks[matchId]=teamIdx;
  savePicks();
  render();
}
function clearDownstream(matchId){
  ROUNDS_DATA.forEach(r=>r.matches.forEach(m=>{
    if(m.feeds&&m.feeds.includes(matchId)&&picks[m.id]!==undefined){
      delete picks[m.id];clearDownstream(m.id);
    }
  }));
}

function render(){
  const wrap=document.getElementById('bracketWrap');
  const colW=210, colGap=36, UNIT=88;
  const matchUnits=[1,2,4,8,16];
  let html='';

  ROUNDS_DATA.forEach((round,ri)=>{
    const slotH=matchUnits[ri]*UNIT;
    html+=`<div class="round-col" style="width:${colW}px;margin-right:${colGap}px;">`;
    round.matches.forEach(m=>{
      const teams=resolveTeams(m.id);
      const pickedIdx=picks[m.id];
      const isLast=ri===ROUNDS_DATA.length-1;
      const cardClass=isLast?'final-match':'match-card';
      html+=`<div class="match-slot" style="height:${slotH}px;display:flex;align-items:center;justify-content:center;">`;
      html+=`<div class="${cardClass}"><div class="match-venue">${m.venue}</div>`;
      teams.forEach((team,ti)=>{
        const isTBD=team.name==='TBD';
        const isPicked=pickedIdx===ti;
        const isElim=pickedIdx!==undefined&&pickedIdx!==ti&&!isTBD;
        let cls='team-row';
        if(isTBD)cls+=' tbd';
        else if(isPicked)cls+=' selected';
        else if(isElim)cls+=' eliminated';
        const onclick=isTBD?'':`onclick="pickTeam('${m.id}',${ti})"`;
        const flagHtml=isTBD?`<span class="flag-placeholder"></span>`:flagSvgHtml(team.name);
        html+=`<div class="${cls}" ${onclick}>${flagHtml}<span class="team-name">${team.name}</span><span class="pick-indicator">✓</span></div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });

  // Champion
  const champion=getWinner('finalm');
  html+=`<div class="champion-col"><div class="champion-label">🏆 World Champion</div><div class="champion-card"><div class="champion-header">FIFA World Cup 2026</div><div class="champion-body">`;
  if(champion){
    html+=`<div class="champion-flag-wrap">${flagSvgHtml(champion.name)}</div>`;
    html+=`<div class="champion-name">${champion.name}</div><div class="trophy-big">🏆</div>`;
  }else{
    html+=`<div style="font-size:40px;opacity:0.15;margin-bottom:10px;">🏆</div><div class="champion-name empty">Complete your bracket</div>`;
  }
  html+=`</div></div></div>`;
  wrap.innerHTML=html;

  let done=0;
  ROUNDS_DATA.forEach(r=>r.matches.forEach(m=>{
    const t=resolveTeams(m.id);
    if(!t.some(x=>x.name==='TBD')&&picks[m.id]!==undefined)done++;
  }));
  const pct=Math.round((done/31)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}

function saveBracket(){savePicks();showToast('Bracket saved! ✓');}
function resetBracket(){
  if(!confirm('Reset all your picks? This cannot be undone.'))return;
  picks={};savePicks();render();showToast('Bracket reset');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
